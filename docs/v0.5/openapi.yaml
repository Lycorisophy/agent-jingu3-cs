openapi: 3.0.3
info:
  title: jingu3 CS v0.5 API 摘要
  version: "0.5.0"
  description: |
    与 [接口文档.md](./接口文档.md) 配套；对话主链路及 v0.5 横切 REST。
    记忆实验 API（v0.6 M1）见 `/api/v1/memory/entries`，详述见 [docs/v0.6/接口文档.md](../v0.6/接口文档.md)（若存在）或代码 `MemoryController`。
servers:
  - url: http://localhost:8080
paths:
  /api/v1/chat:
    post:
      summary: 同步对话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: ApiResult ChatVo
  /api/v1/chat/stream:
    post:
      summary: SSE 流式对话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: text/event-stream
  /api/v1/cron/tasks:
    get:
      summary: 列出定时任务
      responses:
        "200":
          description: ApiResult list ScheduledTaskVo
    post:
      summary: 创建定时任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope, nextRunAt, payload]
              properties:
                scope:
                  type: string
                  enum: [GLOBAL, CONVERSATION]
                conversationId:
                  type: string
                nextRunAt:
                  type: string
                  format: date-time
                cronExpression:
                  type: string
                payload:
                  type: object
                  required: [message]
                  properties:
                    message:
                      type: string
                    mode:
                      type: string
                    conversationId:
                      type: string
      responses:
        "200":
          description: ApiResult ScheduledTaskVo
  /api/v1/hitl/approvals:
    post:
      summary: 创建待审批
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, payloadJson]
              properties:
                conversationId:
                  type: string
                runId:
                  type: string
                payloadJson:
                  type: string
      responses:
        "200":
          description: ApiResult HitlApprovalVo
  /api/v1/hitl/pending:
    get:
      summary: 待审批列表
      parameters:
        - name: conversationId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult list HitlApprovalVo
  /api/v1/hitl/{id}/approve:
    post:
      summary: 批准
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ApiResult HitlApprovalVo
  /api/v1/hitl/{id}/reject:
    post:
      summary: 拒绝
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ApiResult HitlApprovalVo
  /api/v1/dst/{conversationId}:
    get:
      summary: 读取对话状态
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult DialogueStateVo
        "404":
          description: 无记录
    patch:
      summary: 更新对话状态
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stateJson]
              properties:
                stateJson:
                  type: string
                expectedRevision:
                  type: integer
                  format: int64
      responses:
        "200":
          description: ApiResult DialogueStateVo
  /api/v1/dst/{conversationId}/confirm:
    post:
      summary: 用户定稿（revision+1）
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult DialogueStateVo
  /api/v1/memory/entries:
    get:
      summary: 按用户列出记忆条目（v0.6 M1 实验）
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult list MemoryEntryVo
    post:
      summary: 创建记忆条目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, kind]
              properties:
                userId:
                  type: string
                kind:
                  type: string
                  enum: [FACT, EVENT]
                summary:
                  type: string
                body:
                  type: string
                factTag:
                  type: string
      responses:
        "200":
          description: ApiResult MemoryEntryVo
  /api/v1/memory/entries/{id}:
    put:
      summary: 更新记忆条目（v0.6-B；至少改一项）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                summary:
                  type: string
                body:
                  type: string
                kind:
                  type: string
                  enum: [FACT, EVENT]
                factTag:
                  type: string
      responses:
        "200":
          description: ApiResult MemoryEntryVo
    delete:
      summary: 删除记忆条目
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult void
  /api/v1/events:
    post:
      summary: 写入事件文档（v0.6-C；需 jingu3.elasticsearch.enabled=true）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                eventId:
                  type: string
                userId:
                  type: string
                conversationId:
                  type: string
                timestamp:
                  type: string
                action:
                  type: string
                result:
                  type: string
                eventSubject:
                  type: string
                eventLocation:
                  type: string
                modality:
                  type: string
                temporalSemantic:
                  type: string
                vectorId:
                  type: string
                messageId:
                  type: string
      responses:
        "200":
          description: ApiResult object with eventId
  /api/v1/events/search:
    get:
      summary: 按用户与关键词检索事件
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: ApiResult list EventSearchHitVo
components:
  schemas:
    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        mode:
          type: string
        conversationId:
          type: string
        modePlan:
          type: array
          items:
            type: string
        workflowId:
          type: string
        requestId:
          type: string
        traceId:
          type: string
