openapi: 3.0.3
info:
  title: jingu3 CS v0.5 API 摘要
  version: "0.5.0"
  description: |
    与 [接口文档.md](./接口文档.md) 配套；对话主链路及 v0.5 横切 REST。
    记忆实验 API（v0.6 M1）见 `/api/v1/memory/entries`，详述见 [docs/v0.6/接口文档.md](../v0.6/接口文档.md)（若存在）或代码 `MemoryController`。
    工作空间管理 API（v0.7 Phase 3）见 `/api/v1/workspace/**`，详述见 [docs/v0.7/接口文档.md](../v0.7/接口文档.md)。
    技能市场只读列表（v0.7）见 `GET /api/v1/skills`。
servers:
  - url: http://localhost:8080
paths:
  /api/v1/chat:
    post:
      summary: 同步对话
      parameters:
        - name: X-Jingu3-Client-Platform
          in: header
          required: false
          description: 客户端平台标识（如 web、ios）；与请求体 `clientPlatform` 二选一或同时提供，请求头优先。
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: ApiResult ChatVo
  /api/v1/chat/stream:
    post:
      summary: SSE 流式对话
      parameters:
        - name: X-Jingu3-Client-Platform
          in: header
          required: false
          description: 客户端平台标识（如 web、ios）；与请求体 `clientPlatform` 二选一或同时提供，请求头优先。
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: text/event-stream
  /api/v1/cron/tasks:
    get:
      summary: 列出定时任务
      responses:
        "200":
          description: ApiResult list ScheduledTaskVo
    post:
      summary: 创建定时任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope, nextRunAt, payload]
              properties:
                scope:
                  type: string
                  enum: [GLOBAL, CONVERSATION]
                conversationId:
                  type: string
                nextRunAt:
                  type: string
                  format: date-time
                cronExpression:
                  type: string
                payload:
                  type: object
                  required: [message]
                  properties:
                    message:
                      type: string
                    mode:
                      type: string
                    conversationId:
                      type: string
      responses:
        "200":
          description: ApiResult ScheduledTaskVo
  /api/v1/hitl/approvals:
    post:
      summary: 创建待审批
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, payloadJson]
              properties:
                conversationId:
                  type: string
                runId:
                  type: string
                payloadJson:
                  type: string
      responses:
        "200":
          description: ApiResult HitlApprovalVo
  /api/v1/hitl/pending:
    get:
      summary: 待审批列表
      parameters:
        - name: conversationId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult list HitlApprovalVo
  /api/v1/hitl/{id}/approve:
    post:
      summary: 批准
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ApiResult HitlApprovalVo
  /api/v1/hitl/{id}/reject:
    post:
      summary: 拒绝
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: ApiResult HitlApprovalVo
  /api/v1/dst/{conversationId}:
    get:
      summary: 读取对话状态
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult DialogueStateVo
        "404":
          description: 无记录
    patch:
      summary: 更新对话状态
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stateJson]
              properties:
                stateJson:
                  type: string
                expectedRevision:
                  type: integer
                  format: int64
      responses:
        "200":
          description: ApiResult DialogueStateVo
  /api/v1/dst/{conversationId}/confirm:
    post:
      summary: 用户定稿（revision+1）
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult DialogueStateVo
  /api/v1/memory/entries:
    get:
      summary: 按用户列出记忆条目（v0.6 M1 实验）
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult list MemoryEntryVo
    post:
      summary: 创建记忆条目
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, kind]
              properties:
                userId:
                  type: string
                kind:
                  type: string
                  enum: [FACT, EVENT]
                summary:
                  type: string
                body:
                  type: string
                factTag:
                  type: string
                temporalTier:
                  type: string
                  description: kind=FACT 时可选，PERMANENT / LONG_TERM / SHORT_TERM，默认 SHORT_TERM
                confirmed:
                  type: boolean
                  description: kind=FACT 时可选，true 则写入 confirmed_at
      responses:
        "200":
          description: ApiResult MemoryEntryVo
  /api/v1/memory/entries/{id}/confirm:
    post:
      summary: 事实确认（v0.6；kind=FACT）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult MemoryEntryVo
  /api/v1/memory/entries/{id}:
    put:
      summary: 更新记忆条目（v0.6-B；至少改一项）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                summary:
                  type: string
                body:
                  type: string
                kind:
                  type: string
                  enum: [FACT, EVENT]
                factTag:
                  type: string
                temporalTier:
                  type: string
                confirmed:
                  type: boolean
                  description: true 写入确认时刻；false 清空；null 不修改
      responses:
        "200":
          description: ApiResult MemoryEntryVo
    delete:
      summary: 删除记忆条目
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult void
  /api/v1/events:
    post:
      summary: 写入事件文档（v0.6-C；需 jingu3.elasticsearch.enabled=true）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                eventId:
                  type: string
                userId:
                  type: string
                conversationId:
                  type: string
                timestamp:
                  type: string
                action:
                  type: string
                result:
                  type: string
                eventSubject:
                  type: string
                eventLocation:
                  type: string
                modality:
                  type: string
                temporalSemantic:
                  type: string
                vectorId:
                  type: string
                messageId:
                  type: string
      responses:
        "200":
          description: ApiResult object with eventId
  /api/v1/events/search:
    get:
      summary: 按用户与关键词检索事件
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: ApiResult list EventSearchHitVo
  /api/v1/skills:
    get:
      summary: 公开技能目录列表（v0.7）
      description: 需 jingu3.skill.api-enabled=true；返回 is_public 且 status=ACTIVE，不含 storage_path。
      responses:
        "200":
          description: ApiResult list SkillListItemVo
  /api/v1/skills/subscriptions:
    get:
      summary: 当前用户已订阅技能列表（v0.7）
      description: 联表 user_skill + skill；用户 ID 为配置种子 jingu3.user.id；条数上限同 list-max-size。
      responses:
        "200":
          description: ApiResult list SkillSubscriptionItemVo
    post:
      summary: 订阅技能（v0.7）
      description: JSON body skillId；公开且 ACTIVE 技能；已 ACTIVE 幂等。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeSkillRequest"
      responses:
        "200":
          description: ApiResult void
        "400":
          description: 用户不存在或技能未公开/不可用
        "404":
          description: 技能主键不存在
  /api/v1/skills/subscriptions/{skillId}:
    delete:
      summary: 取消订阅（v0.7）
      parameters:
        - name: skillId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult void
        "404":
          description: 未找到订阅
  /api/v1/skills/{slug}:
    get:
      summary: 按 slug 查询公开技能（v0.7）
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ApiResult SkillListItemVo
        "404":
          description: 不存在或未公开（AG_40401）
  /api/v1/workspace:
    get:
      summary: 当前用户工作空间概览（v0.7 Workspace Phase 3）
      description: 用户 ID 取自配置种子用户（`jingu3.user.id`）。需 `jingu3.workspace.enabled=true` 且 `jingu3.workspace.rest-api-enabled=true`。
      responses:
        "200":
          description: ApiResult WorkspaceSummaryVo
          content:
            application/json:
              schema:
                type: object
                description: ApiResult 包装，data 为 WorkspaceSummaryVo
    delete:
      summary: 删除当前用户工作空间（磁盘 + DB 元数据）
      responses:
        "200":
          description: ApiResult void
  /api/v1/workspace/stats:
    get:
      summary: 工作空间磁盘占用统计
      responses:
        "200":
          description: ApiResult WorkspaceFileStatsVo
  /api/v1/workspace/reset:
    post:
      summary: 清空工作空间目录内容（保留目录）
      responses:
        "200":
          description: ApiResult void
  /api/v1/workspace/executions:
    get:
      summary: 沙箱执行历史（摘要）
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: 条数上限，受 jingu3.workspace.execution-history-list-limit 裁剪
      responses:
        "200":
          description: ApiResult list WorkspaceExecutionItemVo；execution-history-enabled=false 时 data 为空数组
components:
  schemas:
    SkillSubscriptionItemVo:
      type: object
      properties:
        subscriptionId:
          type: string
        userId:
          type: string
        subscriptionStatus:
          type: string
        localVersion:
          type: string
        serverVersion:
          type: string
        lastSyncAt:
          type: string
          format: date-time
        externalSkill:
          type: boolean
        externalPath:
          type: string
        skillId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        version:
          type: string
        category:
          type: string
        tags:
          type: string
        triggerWords:
          type: string
        iconUrl:
          type: string
        official:
          type: boolean
        skillStatus:
          type: string
    SubscribeSkillRequest:
      type: object
      required:
        - skillId
      properties:
        skillId:
          type: string
          description: 技能主键（skill.id）
    SkillListItemVo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        version:
          type: string
        category:
          type: string
        tags:
          type: string
          description: JSON 数组字符串
        triggerWords:
          type: string
          description: JSON 数组字符串
        iconUrl:
          type: string
        official:
          type: boolean
        status:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
    WorkspaceSummaryVo:
      type: object
      properties:
        workspaceId:
          type: string
        userId:
          type: string
        rootPath:
          type: string
        quotaMb:
          type: integer
          format: int64
        fileCount:
          type: integer
          format: int64
        totalSizeBytes:
          type: integer
          format: int64
    WorkspaceFileStatsVo:
      type: object
      properties:
        quotaMb:
          type: integer
          format: int64
        fileCount:
          type: integer
          format: int64
        totalSizeBytes:
          type: integer
          format: int64
    WorkspaceExecutionItemVo:
      type: object
      properties:
        id:
          type: string
        language:
          type: string
        runMode:
          type: string
          description: INLINE 或 FILE
        relativePath:
          type: string
          nullable: true
        codeHash:
          type: string
        success:
          type: boolean
        exitCode:
          type: integer
        durationMs:
          type: integer
          format: int64
        errorType:
          type: string
          nullable: true
        timedOut:
          type: boolean
        createdAt:
          type: string
          description: 服务端 LocalDateTime 序列化字符串
    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        mode:
          type: string
        conversationId:
          type: string
        modePlan:
          type: array
          items:
            type: string
        workflowId:
          type: string
        requestId:
          type: string
        traceId:
          type: string
        clientPlatform:
          type: string
          description: 客户端平台；浏览器 WebSocket 等无法自定义握手头时可仅传本字段；HTTP/SSE 可与 X-Jingu3-Client-Platform 二选一，请求头优先。
