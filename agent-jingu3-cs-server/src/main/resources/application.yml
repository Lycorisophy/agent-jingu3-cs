spring:
  application:
    name: agent-jingu3-cs-server
  profiles:
    # 本地 MySQL（如库 jingu_agent）与 Redis/Milvus：复制 application-local.yml.example 为 application-local.yml，使用 --spring.profiles.active=dev,local
    active: dev
  datasource:
    url: jdbc:h2:mem:jingu3;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  config: classpath:log4j2-spring.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

jingu3:
  routing:
    # 显式 Plan/Agent Team 时是否做意图守门（见 IntentRouter）
    explicit-mode-guard-enabled: true
  tool:
    enabled: true
  snowflake:
    worker-id: 1
    datacenter-id: 1
  http:
    sse-emitter-timeout-ms: 600000
  rate-limit:
    enabled: true
    chat-permits-per-minute: 120
  engine:
    react:
      max-steps: 4
    plan:
      max-subtasks: 8
      replan-enabled: true
    agent-team:
      # 子 Agent 轮数（每轮一次 LLM；jingu3.tool.enabled=true 时专员轮与 Ask 相同走 JSON 工具路由）；之后还有一次合成答复调用
      max-specialist-rounds: 2
  ollama:
    base-url: http://localhost:11434
    chat-model: gnremy/qwen3.5-abliterated:35b-a3b
  user:
    id: "001"
    name: user
  # 原始用户提示词密文落库（需配置 crypto.user-prompt-aes-key-base64）
  chat:
    persist-user-prompt: false
  crypto:
    user-prompt-aes-key-base64: ""
  workspace:
    enabled: true
    # 每用户目录：{root-dir}/{jingu3.user.id}/
    root-dir: ${user.home}/.jingu3/workspaces
    max-file-size-mb: 10
    default-quota-mb: 1024
    # Phase 2 沙箱：开启后注册 workspace_execute_code（python/javascript 进程执行）
    sandbox:
      enabled: false
      max-timeout-seconds: 30
      max-output-chars: 65536
      max-code-chars: 100000
      python-command: python
      node-command: node
    rest-api-enabled: true
    execution-history-enabled: true
    execution-history-snippet-max-chars: 8192
    execution-history-list-limit: 50
  memory:
    # v0.6 M1：实验性记忆 API；关闭后不注册 MemoryController
    api-enabled: true
    max-list-size: 100
    # 是否在对话中注入检索到的记忆（需 Milvus + Ollama 嵌入；默认 false）
    injection-enabled: false
    embedding-model: qwen3-embedding:8b
    embedding-dimension: 0
    retrieval-top-k: 5
  skill:
    # v0.7：技能市场元数据列表（skill 表；MinIO 下载 URL 后续迭代）
    api-enabled: true
    list-max-size: 100
  redis:
    enabled: false
    host: 127.0.0.1
    port: 6379
    password: ""
    database: 0
    list-ttl-seconds: 60
  milvus:
    enabled: false
    collection-name: jingu3_memory
    host: 127.0.0.1
    port: 19530
    user: ""
    password: ""
  # v0.6-C：Elasticsearch 事件索引（classpath 模板创建 jingu3-events；无 IK 分词）
  elasticsearch:
    enabled: false
    host: 127.0.0.1
    port: 9200
    scheme: http
    index-events: jingu3-events
    username: ""
    password: ""
  cron:
    demo-schedule: "0 0 9 * * MON-FRI"
    # 是否启用定时轮询执行到期任务（MVP：到点调用 ChatService 一问一答）
    scheduler-enabled: true
    # 轮询间隔（毫秒）
    poll-interval-ms: 30000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: cn.lysoy.jingu3
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
